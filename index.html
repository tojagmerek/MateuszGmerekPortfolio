<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="leftSideBar">
        <div class="profileHeader">
            <img src="assets/img/mainPhoto.jpg" alt="Zdjęcie profilowe Mateusza Gmarka" aria-label="Zdjęcie profilowe">
            <h2>Mateusz Gmerek</h2>
        </div>
        <div class="personalInfo">
            <p>Student informatyki</p>
            <div>
                <img src="assets/img/pin.svg" alt="pineska" aria-label="Ikona lokalizacji">
                <span>Kutno / Łódź, Polska</span>
            </div>
        </div>
        <hr>
        <div class="skills">
            <h4>Umiejętności</h4>
            
            <div class="skill">
                <div class="skill__top">
                    <span>HTML + CSS</span>
                </div>
                <div class="skill__bar" style="--p: 90%">
                    <span></span>
                </div>
            </div>

            <div class="skill">
                <div class="skill__top">
                    <span>JS</span>
                </div>
                <div class="skill__bar" style="--p: 50%">
                    <span></span>
                </div>
            </div>

            <div class="skill">
                <div class="skill__top">
                    <span>SQL</span>
                </div>
                <div class="skill__bar" style="--p: 50%">
                    <span></span>
                </div>
            </div>

            <div class="skill">
                <div class="skill__top">
                    <span>C++</span>
                </div>
                <div class="skill__bar" style="--p: 40%">
                    <span></span>
                </div>
            </div>

            <div class="skill">
                <div class="skill__top">
                    <span>React</span>
                </div>
                <div class="skill__bar" style="--p: 10%">
                    <span></span>
                </div>
            </div>

        </div>
        <hr>
        <div class="contact">
            <h4>Kontakt</h4>
            
            
        </div>
    </div>

    <div class="mainPage">
        <h1>Front-end Developer</h1>
        <div class="mainPage__text">
            <span><code>&lt;code&gt;</code></span>
            <span><code>UI, Responsywność</code></span>
            <span><code>&lt;/code&gt;</code></span>
        </div>
        <a href="./assets/Mateusz_Gmerek_CV.pdf" download class="download">Pobierz CV</a>

        <div class="backgroundImg">
            <img src="assets/img/background3.png" alt="Tło - las" aria-label="Dekoracyjne tło lasu">
        </div>
        <!-- <div class="experience">No może kiedyś</div> -->
        <div class="rest">
            <div class="rest-content">
                <h2>Moje Prace</h2>
                <div id="myWork" class="myWork"></div>
            </div>
        </div>
    </div>

    <div class="project-window">
            <div class="project-window__content">
                <h2 id="projectTitle"></h2>
                <button class="close-btn" aria-label="Zamknij okno projektu">&times;</button>
                <img id="projectImage" src="" alt="Zrzut ekranu projektu" aria-label="Zrzut ekranu projektu">
                
                <div id="projectTags" class="project-window__tags"></div>
                <p id="projectFullDesc"></p>
                <div class="project-links">
                    <a id="projectWebUrl" href="#" target="_blank" class="project-link">Zobacz Projekt</a>
                    <a id="projectGitUrl" href="#" target="_blank" class="project-link">Github</a>
                </div>
            </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
